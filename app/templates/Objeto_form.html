{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Objeto - Objex</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Ícone da aba -->
    <link rel="icon" type="image/png"
          href="{% static 'img/logo_objex.png' %}">

    <style>
        body {
            background-image: url("{% static 'img/fundo_objex.png' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .navbar {
            background-color: #5dade2;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 30px;
            margin-top: 40px;
            margin-bottom: 40px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            color: #0d6efd;
            font-weight: bold;
        }

        .btn-objex {
            background-color: #0d6efd;
            color: white;
        }

        .btn-objex:hover {
            background-color: #0b5ed7;
            color: white;
        }
    </style>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">

        <a class="navbar-brand" href="/">
            <img src="{% static 'img/logo_objex.png' %}"
                 width="40"
                 height="40"
                 class="d-inline-block align-top"
                 alt="Logo">

            Objex
        </a>

        <button class="navbar-toggler"
                type="button"
                data-toggle="collapse"
                data-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/objeto/">
                        Objetos
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/admin/">
                        Administração
                    </a>
                </li>

            </ul>

        </div>

    </nav>


    <!-- Conteúdo -->
    <div class="container">

        <div class="form-container">

            <h2 class="text-center mb-4">
                Registrar Objeto Encontrado
            </h2>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <div class="text-center mt-4">

                    <button type="submit"
                            class="btn btn-objex mr-2">

                        Salvar Objeto

                    </button>

                    <a href="/objeto/"
                       class="btn btn-secondary">

                        Cancelar

                    </a>

                </div>

            </form>

        </div>

    </div>


    <!-- Scripts Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js">
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js">
    </script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js">
    </script>

</body>
</html>
