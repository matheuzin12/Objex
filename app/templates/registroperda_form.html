{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registrar objeto Perdido - Objex</title>
    
    
        <link rel="stylesheet"
              href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    
        <link rel="icon" type="image/png"
              href="{% static 'img/logo_objex.png' %}"
              width="150"
                height="90">
    
        <style>
            body {
                background-image: url("{% static 'img/fundo_objex.png' %}");
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                min-height: 100vh;
            }
    
            .navbar {
                background-color: #3886fb;
            }
    
            .form-container {
                background: rgba(255, 255, 255, 0.85);
                border-radius: 20px;
                padding: 30px;
                margin-top: 40px;
                margin-bottom: 40px;
                box-shadow: 0 0 15px rgba(0,0,0,0.2);
            }
    
            h2 {
                color: #3280f5;
                font-weight: bold;
            }
    
            .btn-objex {
                background-color: #0d6efd;
                color: white;
            }
    
            .btn-objex:hover {
                background-color: #0b5ed7;
                color: white;
            }
        </style>
    
    </head>
    
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark">
    
            <a class="navbar-brand" href="/">
                <a class="navbar-brand" href="/">
                    <a class="navbar-brand" href="/">
                        <img src="/static/img/logo_objex.png"
                             alt="Objex"
                             width="150"
                             height="90">
                    </a>
                    
                </a>
            </a>
    
            <button class="navbar-toggler"
                    type="button"
                    data-toggle="collapse"
                    data-target="#navbarNav">
    
                <span class="navbar-toggler-icon"></span>
    
            </button>
    
            <div class="collapse navbar-collapse"
                 id="navbarNav">
    
                <ul class="navbar-nav">
    
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            Home
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a class="nav-link" href="/objeto/">
                            Objetos
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">
                            Administração
                        </a>
                    </li>
    
                </ul>
    
            </div>
    
        </nav>
<div class="container mt-5">

    <div class="card">

        <div class="card-header bg-danger text-white">
            <h3>Registrar Perda de Objeto</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <div class="text-center">

                    <button type="submit" class="btn btn-success">
                        Salvar
                    </button>

                    <a href="/registroperda/" class="btn btn-danger">
                        Cancelar
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
